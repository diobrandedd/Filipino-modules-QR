<!DOCTYPE html>
<html>
<head>
    <title>Lesson Module</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        /* Loader Screen */
        #loader {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: linear-gradient(to bottom, #ffffff, #e6e6e6);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }

        /* Logo Image */
        #logo {
            width: 150px;
            transition: transform 1s ease, opacity 1s ease;
        }

        /* Animation when leaving */
        .raise {
            transform: translateY(-200px);
            opacity: 0;
        }

        /* PDF Viewer */
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }

    </style>
</head>
<body>

<div id="loader">
    <img src="logo.gif" id="logo">
    <p>Loading Module...</p>
</div>
                      
<iframe src="https://drive.google.com/file/d/1n_UXRGs1dFmeLnn635uCx4nf8J5SCh8s/preview" id="pdfFrame"></iframe>

<script>
    window.onload = function() {

        // Wait 2 seconds before starting animation
        setTimeout(function() {

            // Add animation class
            document.getElementById("logo").classList.add("raise");

            // Wait 1 second for animation to finish
            setTimeout(function() {
                document.getElementById("loader").style.display = "none";
                document.getElementById("pdfFrame").style.display = "block";
            }, 1000);

        }, 2000);

    };
</script>

</body>
</html>
