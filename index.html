<!DOCTYPE html>
<html>
<head>
    <title>Lesson Module</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

#loader {
    position: fixed;
    width: 100%;
    height: 100vh;
    background: white;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    transition: opacity 0.5s ease;
}


        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }
    </style>
</head>
<body>

<div id="loader">
    📘 Loading Module...
</div>

<iframe src="module.pdf" id="pdfFrame"></iframe>

<script>
    window.onload = function() {

        setTimeout(function() {
            document.getElementById("loader").style.opacity = "0";

            setTimeout(function() {
                document.getElementById("loader").style.display = "none";
                document.getElementById("pdfFrame").style.display = "block";
            }, 500);

        }, 2000);

    };
</script>


</body>

</html>
