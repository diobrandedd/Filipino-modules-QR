<!DOCTYPE html>
<html>
<head>
    <title>Lesson Module</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* LOADER CONTAINER */
        #loader {
            position: fixed;
            width: 100%;
            height: 100vh;
            background: #f5e6c8; /* old paper color */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            overflow: hidden;
        }

        /* PAPER STYLE */
        .paper {
            position: absolute;
            width: 100%;
            height: 50%;
            background: url("https://www.transparenttextures.com/patterns/aged-paper.png");
            background-color: #f5e6c8;
            transition: transform 1s ease-in-out;
        }

        #paperTop {
            top: 0;
        }

        #paperBottom {
            bottom: 0;
        }

        /* PDF */
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }
    </style>
</head>
<body>

<div id="loader">
    <div id="paperTop" class="paper"></div>
    <div id="paperBottom" class="paper"></div>
</div>

<iframe src="module.pdf" id="pdfFrame"></iframe>

<script>
    window.onload = function() {

        setTimeout(function() {

            // Slide animation
            document.getElementById("paperTop").style.transform = "translateY(-100%)";
            document.getElementById("paperBottom").style.transform = "translateY(100%)";

            // After animation finishes
            setTimeout(function() {
                document.getElementById("loader").style.display = "none";
                document.getElementById("pdfFrame").style.display = "block";
                document.body.style.overflow = "auto";
            }, 1000);

        }, 2000); // 2 second loading
    };
</script>

</body>
</html>
