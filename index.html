<!DOCTYPE html>
<html>
<head>
    <title>Lesson Module</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Loader Container */
        #loader {
            position: fixed;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            z-index: 999;
        }

        /* Background Video */
        #bgVideo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s ease, opacity 1s ease;
        }

        /* Exit Animation */
        .raise {
            transform: translateY(-100%);
            opacity: 0;
        }

        /* PDF Viewer */
        iframe {
            width: 100%;
            height: 100vh;
            border: none;
            display: none;
        }
    </style>
</head>
<body>

<div id="loader">
    <video autoplay muted playsinline id="bgVideo">
        <source src="intro.mp4" type="video/mp4">
    </video>
</div>

<iframe src="https://drive.google.com/file/d/1n_UXRGs1dFmeLnn635uCx4nf8J5SCh8s/preview" id="pdfFrame"></iframe>

<script>
    const video = document.getElementById("bgVideo");

    video.addEventListener("ended", function() {

        // Start fade animation
        video.classList.add("fade-out");

        // Wait 1 second for fade to finish
        setTimeout(function() {
            document.getElementById("loader").style.display = "none";
            document.getElementById("pdfFrame").style.display = "block";
        }, 1000);

    });
</script>


</body>
</html>
