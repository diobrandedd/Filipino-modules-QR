<!DOCTYPE html>
<html>
<head>
    <title>Lesson Module</title>

    <style>
        body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Loader Container */
#loader {
    position: fixed;
    inset: 0; /* Better than width + height */
    overflow: hidden;
    z-index: 999;
}

/* Background Video */
#bgVideo {
    position: fixed;   /* IMPORTANT CHANGE */
    top: 0;
    left: 0;
    min-width: 100%;
    min-height: 100%;
    width: auto;
    height: auto;
    object-fit: cover;
    transition: opacity 1s ease;
}

/* Fade Animation */
.fade-out {
    opacity: 0;
}

/* PDF Viewer */
iframe {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    border: none;
    display: none;
}

    </style>
</head>
<body>

<div id="loader">
    <video autoplay muted playsinline id="bgVideo">
        <source src="intro.mp4" type="video/mp4">
    </video>
</div>

<iframe src="https://drive.google.com/file/d/1n_UXRGs1dFmeLnn635uCx4nf8J5SCh8s/preview" id="pdfFrame"></iframe>

<script>
    const video = document.getElementById("bgVideo");

    video.addEventListener("ended", function() {

        video.classList.add("fade-out");

        setTimeout(function() {
            document.getElementById("loader").style.display = "none";
            document.getElementById("pdfFrame").style.display = "block";
        }, 1000);

    });
</script>


</body>
</html>
